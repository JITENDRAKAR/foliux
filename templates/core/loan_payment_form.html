{% extends "base.html" %}
{% load static %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="bg-white rounded-4 shadow-sm border p-4 p-md-5">
                <div class="mb-4 text-center">
                    <h2 class="fw-800 mb-2">Add Prepayment</h2>
                    <p class="text-muted">Recording an extra payment for <strong>{{ loan.bank_name }}</strong> loan.</p>
                </div>

                <form method="post" class="row g-4">
                    {% csrf_token %}
                    <div class="col-12">
                        <label class="form-label fw-bold">Prepayment Amount</label>
                        <div class="input-group input-group-lg">
                            <span class="input-group-text bg-white">₹</span>
                            <input type="number" name="amount" class="form-control" step="0.01" required placeholder="0.00">
                        </div>
                    </div>
                    
                    <div class="col-12 text-center text-muted small mt-2">
                        <p>This amount will be deducted directly from the Principal Outstanding.</p>
                    </div>

                    <div class="col-12">
                        <label class="form-label fw-bold">Payment Date</label>
                        <input type="date" name="date" class="form-control" required value="{{ now|date:'Y-m-d' }}">
                    </div>

                    <div class="col-12 mt-5">
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-success btn-lg rounded-pill fw-bold shadow-sm py-3">Confirm Payment</button>
                            <a href="{% url 'loan_detail' loan.id %}" class="btn btn-link link-secondary fw-bold">Cancel</a>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
