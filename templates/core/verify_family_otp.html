{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block content %}
<div class="row justify-content-center py-5">
    <div class="col-md-5 col-lg-4">
        <div class="card shadow-sm border-0 rounded-4">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <div class="d-inline-flex align-items-center justify-content-center bg-warning text-white rounded-circle mb-3"
                        style="width: 64px; height: 64px;">
                        <i class="fas fa-user-friends fa-lg"></i>
                    </div>
                    <h3 class="fw-bold">Verify Family Link</h3>
                    <p class="text-muted small">Please enter the 6-digit code sent to <strong>{{ target_user.email }}</strong></p>
                </div>

                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="otp" class="form-label fw-bold small text-muted text-uppercase">Verification Code</label>
                        <input type="text" name="otp" id="otp" class="form-control form-control-lg text-center fw-bold letter-spacing-4" 
                               maxlength="6" placeholder="000000" autofocus required>
                    </div>
                    <button type="submit" class="btn btn-warning w-100 py-2 fw-bold shadow-sm mt-3">
                        Authorize Link <i class="fas fa-link ms-2"></i>
                    </button>
                </form>

                <div class="text-center mt-4 pt-3 border-top">
                    <p class="small text-muted mb-0">Note: The account owner must provide you with this code to grant access.</p>
                    <a href="{% url 'edit_profile' %}" class="small text-primary text-decoration-none mt-2 d-inline-block">Cancel request</a>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .letter-spacing-4 {
        letter-spacing: 0.5rem;
    }
</style>
{% endblock %}
