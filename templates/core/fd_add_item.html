{% extends "base.html" %}

{% block extra_css %}
<style>
    .form-container {
        max-width: 600px;
        margin: 0 auto;
        background: white;
        padding: 40px;
        border-radius: 24px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
        border: 1px solid rgba(100, 116, 139, 0.1);
    }
    .form-label {
        font-weight: 600;
        color: #475569;
        margin-bottom: 8px;
    }
    .form-control, .form-select {
        border-radius: 12px;
        padding: 12px 16px;
        border: 2px solid #e2e8f0;
        transition: all 0.3s;
    }
    .form-control:focus, .form-select:focus {
        border-color: #475569;
        box-shadow: 0 0 0 4px rgba(100, 116, 139, 0.1);
    }
    .btn-submit {
        background: linear-gradient(135deg, #475569 0%, #64748b 100%);
        color: white;
        border: none;
        padding: 14px;
        border-radius: 12px;
        font-weight: 700;
        width: 100%;
        margin-top: 20px;
        transition: all 0.3s;
    }
    .btn-submit:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(100, 116, 139, 0.2);
        color: white;
    }
</style>
{% endblock %}

{% block content %}
<div class="row justify-content-center py-5">
    <div class="col-md-8">
        <div class="text-center mb-5">
            <h1 class="fw-800 text-fd" style="color: #475569;">Add Fixed Asset</h1>
            <p class="text-muted">Record your FD, PPF, or other fixed instrument.</p>
        </div>
        
        <div class="form-container">
            <form method="POST">
                {% csrf_token %}
                
                <div class="mb-4">
                    <label for="instrument_name" class="form-label">Instrument Name</label>
                    <input type="text" name="instrument_name" id="instrument_name" class="form-control" placeholder="e.g. SBI FD, PPF, Corporate Bond" required>
                </div>
                
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label for="invested_amount" class="form-label">Invested Amount (INR)</label>
                        <input type="number" step="0.01" name="invested_amount" id="invested_amount" class="form-control" placeholder="0.00" required>
                    </div>
                    <div class="col-md-6">
                        <label for="interest_rate" class="form-label">Annual Interest Rate (%)</label>
                        <input type="number" step="0.01" name="interest_rate" id="interest_rate" class="form-control" placeholder="e.g. 7.1" required>
                    </div>
                </div>

                <div class="row mb-4">
                    <div class="col-md-6">
                        <label for="investment_date" class="form-label">Investment Date</label>
                        <input type="date" name="investment_date" id="investment_date" class="form-control" required>
                        <div class="help-text text-muted small mt-1">Date when the asset was started.</div>
                    </div>
                    <div class="col-md-6">
                        <label for="maturity_date" class="form-label">Maturity Date (Optional)</label>
                        <input type="date" name="maturity_date" id="maturity_date" class="form-control">
                        <div class="help-text text-muted small mt-1">Interest stops at this date.</div>
                    </div>
                </div>
                
                <button type="submit" class="btn-submit">
                    <i class="fas fa-plus-circle me-2"></i>Add to Portfolio
                </button>
                
                <div class="mt-4 pt-3 border-top text-center">
                    <a href="{% url 'fd_dashboard' %}" class="text-decoration-none fw-600" style="color: #475569;">
                        <i class="fas fa-arrow-left me-2"></i>Back to Fixed Assets Dashboard
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
